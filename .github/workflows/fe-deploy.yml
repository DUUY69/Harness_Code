name: FE Deploy

# Manual redeploy — automatic deploy runs in FE CI (deploy job on push main).
on:
  workflow_dispatch:

concurrency:
  group: fe-deploy-manual
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://168.144.38.133:8093/
    env:
      SSH_HOST: ${{ vars.SSH_HOST || '168.144.38.133' }}
      SSH_USER: ${{ secrets.SSH_USER || vars.SSH_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY || vars.SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy config
        run: |
          missing=0
          for name in SSH_HOST SSH_USER DEPLOY_PATH SSH_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing $name (production environment secret or variable)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "Deploy target: ${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" "echo ssh-ok"

      - name: Sync static files
        run: |
          tar -C frontend -cf - . | ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}' && tar -xf - -C '${DEPLOY_PATH}'"

      - name: Fix permissions on server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" \
            "rm -rf '${DEPLOY_PATH}/sosbike' '${DEPLOY_PATH}/assets'; chmod -R a+rX '${DEPLOY_PATH}' && chown -R www-data:www-data '${DEPLOY_PATH}' || true"
