name: FE CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - "scripts/**"
      - ".github/workflows/fe-ci.yml"
      - ".github/workflows/fe-deploy.yml"
      - ".github/html-validate.json"
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - "scripts/**"
      - ".github/workflows/fe-ci.yml"
      - ".github/workflows/fe-deploy.yml"
      - ".github/html-validate.json"

concurrency:
  group: fe-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify landing page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run FE verification
        run: bash scripts/verify-fe.sh

  deploy:
    name: Deploy to production
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://168.144.38.133:8093/
    env:
      SSH_HOST: ${{ vars.SSH_HOST || '168.144.38.133' }}
      SSH_USER: ${{ secrets.SSH_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy config
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          missing=0
          for name in SSH_HOST SSH_USER DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing $name"
              missing=1
            fi
          done
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing SSH_PRIVATE_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "Deploy target: ${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}"

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=15 \
            "${SSH_USER}@${SSH_HOST}" "echo ssh-ok"

      - name: Rsync static files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            frontend/ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Fix permissions on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SSH_HOST || '168.144.38.133' }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod -R a+rX "${{ secrets.DEPLOY_PATH }}"
            chown -R www-data:www-data "${{ secrets.DEPLOY_PATH }}" || true
